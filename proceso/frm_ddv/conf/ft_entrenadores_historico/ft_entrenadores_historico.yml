ft_entrenadores_historico:

  cols_hm_entrenadores:
    - id_entrenador_equipo
    - id_equipo
    - id_entrenador
    - temporada
    - fecha_inicio
    - fecha_termino
    - tiempo_en_cargo
    - partidos
    - ppp
    - entrenador_activo
    - periodo

  cols_md_entrenadores:
    - id_entrenador
    - entrenador
    - edad
    - nacionalidad_principal
    - segunda_nacionalidad

  cols_dm_equipos:
    - id_equipo
    - nombre_equipo
    - alias_equipo

  schema:
    id_entrenador_equipo:   string
    id_equipo:              int
    nombre_equipo:          string
    alias_equipo:           string
    id_entrenador:          string
    entrenador:             string
    edad:                   int
    nacionalidad_principal: string
    segunda_nacionalidad:   string
    temporada:              int
    fecha_inicio:           date
    fecha_termino:          date
    tiempo_en_cargo:        string
    partidos:               int
    ppp:                    decimal(10,4)
    entrenador_activo:      int
    fecha_carga:            timestamp
    periodo:                int
