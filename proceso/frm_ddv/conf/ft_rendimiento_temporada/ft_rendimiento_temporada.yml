ft_rendimiento_temporada:

  cols_hm_clasificacion:
    - id_clasificacion
    - id_equipo
    - temporada
    - tipo_tabla
    - posicion
    - partidos_jugados
    - partidos_ganados
    - partidos_empatados
    - partidos_perdidos
    - goles_favor
    - goles_contra
    - diferencia_goles
    - puntos
    - periodo

  cols_hm_valoracion:
    - id_equipo
    - temporada
    - valor_total
    - valor_medio

  cols_dm_equipos:
    - id_equipo
    - nombre_equipo
    - alias_equipo

  schema:
    id_clasificacion:   string
    id_equipo:          int
    nombre_equipo:      string
    alias_equipo:       string
    temporada:          int
    tipo_tabla:         string
    posicion:           int
    partidos_jugados:   int
    partidos_ganados:   int
    partidos_empatados: int
    partidos_perdidos:  int
    goles_favor:        int
    goles_contra:       int
    diferencia_goles:   int
    puntos:             int
    valor_total:        decimal(20,4)
    valor_medio:        decimal(20,4)
    fecha_carga:        timestamp
    periodo:            int
