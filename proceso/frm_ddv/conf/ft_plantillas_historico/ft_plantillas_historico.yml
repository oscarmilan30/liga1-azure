ft_plantillas_historico:

  cols_hm_plantillas:
    - id_plantilla_equipo
    - id_equipo
    - id_jugador
    - id_tm
    - temporada
    - numero_camiseta
    - posicion
    - fecha_fichaje
    - periodo

  cols_md_plantillas:
    - id_jugador
    - jugador
    - edad
    - nacionalidad_principal
    - segunda_nacionalidad
    - altura
    - pie
    - valor_mercado
    - foto_url

  cols_dm_equipos:
    - id_equipo
    - nombre_equipo
    - alias_equipo

  schema:
    id_plantilla_equipo:    string
    id_equipo:              int
    nombre_equipo:          string
    alias_equipo:           string
    id_jugador:             string
    id_tm:                  string
    jugador:                string
    temporada:              int
    numero_camiseta:        string
    posicion:               string
    fecha_fichaje:          date
    edad:                   int
    nacionalidad_principal: string
    segunda_nacionalidad:   string
    altura:                 double
    pie:                    string
    valor_mercado:          decimal(20,4)
    foto_url:               string
    fecha_carga:            timestamp
    periodo:                int
