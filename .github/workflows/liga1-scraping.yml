name: Liga 1 - Web Scraping

on:
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de ejecución'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - historica
          - reproceso
      anio_objetivo:
        description: 'Año a reprocesar (solo modo reproceso)'
        required: false
        default: ''
      anio_inicio:
        description: 'Año inicio (modo historica)'
        required: false
        default: '2020'
      anio_fin:
        description: 'Año fin (modo historica) - Recomendado: 2024'
        required: false
        default: '2024'

  schedule:
    - cron: '0 14 * * 1'

env:
  PYTHON_VERSION: '3.10'

jobs:
  scraping:
    name: Ejecutar Scraping Liga 1
    runs-on: ubuntu-latest
    # TIMEOUT A NIVEL DE JOB - MÁS CONFIABLE
    timeout-minutes: ${{ github.event.inputs.modo == 'historica' && 130 || 30 }}
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: frm_landing/scraping/requirements.txt

      - name: Instalar dependencias
        run: pip install -r frm_landing/scraping/requirements.txt

      - name: Verificar Chrome
        run: google-chrome --version || chromium-browser --version

      - name: Ejecutar scraping
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SCRAPING_MODO: ${{ github.event.inputs.modo || 'incremental' }}
          SCRAPING_ANIO_INICIO: ${{ github.event.inputs.anio_inicio || '2020' }}
          SCRAPING_ANIO_FIN: ${{ github.event.inputs.anio_fin || '2024' }}
        run: |
          # Forzar modo incremental si es schedule
          if [ "${{ github.event_name }}" = "schedule" ]; then
            export SCRAPING_MODO="incremental"
            echo "Ejecución programada: usando modo incremental"
          fi
          
          if [ "$SCRAPING_MODO" = "historica" ]; then
            python frm_landing/scraping/scraping.py --modo historica \
              --anio-inicio $SCRAPING_ANIO_INICIO \
              --anio-fin $SCRAPING_ANIO_FIN
          elif [ "$SCRAPING_MODO" = "reproceso" ]; then
            python frm_landing/scraping/scraping.py --modo reproceso \
              --anio-objetivo ${{ github.event.inputs.anio_objetivo }}
          else
            python frm_landing/scraping/scraping.py --modo incremental
          fi