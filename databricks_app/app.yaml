# ============================================================
# Databricks App — Liga 1 Perú RAG Assistant
# Streamlit app que consulta Delta tables y responde
# preguntas en lenguaje natural via Azure OpenAI.
# ============================================================

command:
  - streamlit
  - run
  - app.py
  - --server.port=8000
  - --server.address=0.0.0.0
  - --server.headless=true

env:
  # Solo valores que NO cambian entre dev y prod.
  # DATABRICKS_HOST lo inyecta Databricks automáticamente al correr como App.
  # HTTP_PATH y catalog se leen desde el scope secretliga1 de cada workspace.
  - name: AOAI_ENDPOINT
    value: "https://aoai-liga1.openai.azure.com/"
  - name: AOAI_DEPLOYMENT
    value: "gpt-5.4-mini"
  - name: AOAI_API_VERSION
    value: "2025-01-01-preview"
